<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pasta_nome }} - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fb; padding-bottom: 70px; }
        .header { background: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { font-size: 24px; text-decoration: none; color: #6C63FF; }
        .container { padding: 20px; }
        .arquivo-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .empty { text-align: center; padding: 50px; color: #888; }
        .bottom-menu { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1><i class="fas fa-folder"></i> {{ pasta_nome }}</h1>
    </div>
    <div class="container">
        {% if arquivos and arquivos|length > 0 %}
            {% for arquivo in arquivos %}
            <a href="/visualizar/{{ arquivo[0] }}" class="arquivo-item" style="text-decoration: none; color: inherit;">
                <i class="fas {% if arquivo[2] == 'foto' %}fa-file-image{% elif arquivo[2] == 'video' %}fa-file-video{% else %}fa-file-alt{% endif %}"></i>
                <div style="flex:1">
                    <strong>{{ arquivo[1] }}</strong>
                    <p style="font-size:12px; color:#888">{{ arquivo[3] }} MB</p>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
            {% endfor %}
        {% else %}
            <div class="empty">
                <i class="fas fa-folder-open" style="font-size: 50px; color: #ccc;"></i>
                <p>Pasta vazia</p>
                <a href="/upload-page" style="color:#6C63FF">Enviar arquivo</a>
            </div>
        {% endif %}
    </div>
    <div class="bottom-menu">
        <a href="/dashboard"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="/meus-arquivos"><i class="fas fa-folder"></i><span>Arquivos</span></a>
        <a href="/perfil"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>
</body>
</html>
