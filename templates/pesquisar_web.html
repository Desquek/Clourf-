<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f5f7fb; padding: 20px; margin: 0; }
        .header { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .search-box { background: white; padding: 20px; border-radius: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; font-size: 16px; }
        button { background: #6C63FF; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; }
        .back-btn { display: inline-block; margin-bottom: 15px; color: #6C63FF; text-decoration: none; }
    </style>
</head>
<body>
    <a href="/dashboard" class="back-btn">← Voltar</a>
    
    <div class="header">
        <h1><i class="fas fa-search"></i> Pesquisar na Web</h1>
    </div>
    
    <form method="GET" class="search-box">
        <input type="text" name="q" placeholder="Digite sua pesquisa..." value="{{ query }}">
        <button type="submit"><i class="fas fa-search"></i> Buscar</button>
    </form>
    
    {% if query %}
    <p style="margin-top: 20px;">🔍 Pesquisando "{{ query }}" no Google...</p>
    <p>Vai ser redirecionado automaticamente.</p>
    {% endif %}
</body>
</html>
