<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .top-bar {
            background: transparent;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .menu-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
        }
        .top-avatar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .top-avatar .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-size: 1.2rem;
            border: 2px solid #93C5FD;
            cursor: pointer;
            overflow: hidden;
        }
        .top-avatar .nome {
            color: #FFFFFF;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--azul-escuro);
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            transition: left 0.3s ease;
            z-index: 1001;
            padding: 2rem 1.5rem;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .sidebar-header .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFFFFF;
        }
        .sidebar-close {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar-nav a {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            color: #CBD5E1;
            transition: background 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.1);
            color: #FFFFFF;
        }
        .sidebar-nav a i {
            width: 24px;
            font-size: 1.2rem;
        }
