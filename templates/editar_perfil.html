{% extends "base.html" %}

{% block title %}Editar Perfil - Clourf{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-edit"></i> Editar perfil</h1>
    <p>Atualize as suas informações pessoais.</p>

    <form method="POST">
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" name="nome" value="{{ user.nome }}" required>
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" name="telefone" value="{{ user.telefone or '' }}" placeholder="84 123 4567">
        </div>

        <div class="form-group">
            <label>Localização</label>
            <input type="text" name="localizacao" value="{{ user.localizacao or '' }}" placeholder="Maputo, Matola...">
        </div>

        <div class="form-group">
            <label>Sobre mim</label>
            <textarea name="bio" rows="4" placeholder="Fale um pouco sobre si...">{{ user.bio or '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar</button>
            <a href="{{ url_for('profile.perfil') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
