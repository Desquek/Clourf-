<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-cloud"></i>
                <h2>Clourf</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" class="active"><i class="fas fa-user"></i> Perfil</a>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>
        
        <main class="dashboard-main">
            <div class="dashboard-header">
                <h1><i class="fas fa-user"></i> Meu Perfil</h1>
            </div>
            
            <div class="perfil-card">
                <div class="perfil-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="perfil-info">
                    <p><strong>Usuário:</strong> {{ user[0] }}</p>
                    <p><strong>Email:</strong> {{ user[1] or 'Não informado' }}</p>
                    <p><strong>Membro desde:</strong> {{ user[2] }}</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
