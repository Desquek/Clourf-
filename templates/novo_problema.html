{% extends "base.html" %}

{% block title %}Publicar problema - Clourf{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-plus-circle"></i> Publicar problema</h1>
    <p>Descreva o que precisa e encontre quem pode ajudar.</p>

    <form method="POST">
        <div class="form-group">
            <label>Título do problema <span class="required">*</span></label>
            <input type="text" name="titulo" placeholder="Ex: Preciso de um eletricista" required>
        </div>

        <div class="form-group">
            <label>Descrição detalhada <span class="required">*</span></label>
            <textarea name="descricao" rows="5" placeholder="Descreva o que precisa com o máximo de detalhes..." required></textarea>
        </div>

        <div class="form-group">
            <label>Categoria <span class="required">*</span></label>
            <select name="categoria" required>
                <option value="">Selecione uma categoria</option>
                <option value="Serviços">Serviços</option>
                <option value="Design">Design</option>
                <option value="Reparos">Reparos</option>
                <option value="Transporte">Transporte</option>
                <option value="Aulas">Aulas</option>
                <option value="Eventos">Eventos</option>
                <option value="Outros">Outros</option>
            </select>
        </div>

        <div class="form-group">
            <label>Localização</label>
            <input type="text" name="localizacao" placeholder="Cidade, bairro (ex: Maputo, Matola)">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary"><i class="fas fa-share"></i> Publicar problema</button>
            <a href="{{ url_for('home.inicio') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
