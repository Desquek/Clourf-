<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Clourf</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <img src="/static/images/logo.png" alt="Clourf Logo" style="width: 80px; margin-bottom: 20px;">
        <h1>Crie sua conta no Clourf</h1>
        <p>Seja o primeiro administrador ou apenas um usuário!</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="message message-error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Nome de usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit" class="btn btn-primary">Criar Conta</button>
        </form>
        <p>Já tem conta? <a href="/login">Entre aqui</a></p>
    </div>
</body>
</html>
