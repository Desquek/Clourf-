<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Conta - Clourf</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>Criar Conta</h1>

<form method="POST">

<input
type="text"
name="nome"
placeholder="Nome completo"
required>

<input
type="text"
name="username"
placeholder="@utilizador"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Palavra-passe"
required>

<button type="submit">

Criar Conta

</button>

</form>

<p>

Já tens conta?

<a href="{{ url_for('auth.login') }}">

Entrar

</a>

</p>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}

<p>{{ message }}</p>

{% endfor %}
{% endif %}
{% endwith %}

</div>

</body>

</html>
