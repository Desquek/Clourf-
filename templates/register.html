{% extends "base.html" %}

{% block title %}Registar - Clourf{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-handshake"></i> Clourf</div>
        <h2>Criar conta</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" name="nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" name="telefone" placeholder="84 123 4567">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Crie uma senha" required>
            </div>
            <button type="submit" class="btn-primary">Criar conta</button>
        </form>

        <p class="auth-link">Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a></p>
    </div>
</div>
{% endblock %}
