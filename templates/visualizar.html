<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ arquivo_nome }} - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        
        .header { 
            background: rgba(0,0,0,0.8); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 10; 
            backdrop-filter: blur(10px);
        }
        .back-btn { font-size: 24px; text-decoration: none; color: white; }
        .file-name { color: white; flex: 1; font-size: 14px; word-break: break-all; }
        
        .content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 80px 20px 20px; 
            min-height: 100vh;
        }
        
        .imagem-container {
            max-width: 100%;
            max-height: 80vh;
            text-align: center;
        }
        .imagem-container img { 
            max-width: 100%; 
            max-height: 80vh; 
            border-radius: 10px; 
            object-fit: contain; 
        }
        
        .video-container video { 
            max-width: 100%; 
            max-height: 80vh; 
            border-radius: 10px; 
        }
        
        .file-icon { 
            text-align: center; 
            color: white; 
            padding: 30px;
        }
        .file-icon i { font-size: 80px; margin-bottom: 20px; }
        .file-icon h3 { margin-bottom: 10px; }
        .file-icon p { color: #888; }
        
        .download-btn { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: #6C63FF; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 30px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: 0 4px 15px rgba(108,99,255,0.3);
            z-index: 20;
        }
        
        .error-msg {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .error-msg i { font-size: 60px; margin-bottom: 20px; color: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="file-name">{{ arquivo_nome }}</div>
    </div>
    
    <div class="content">
        {% if arquivo_tipo == 'foto' %}
            <div class="imagem-container">
                <img src="/{{ arquivo_caminho }}" alt="{{ arquivo_nome }}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'error-msg\'><i class=\'fas fa-exclamation-triangle\'></i><h3>Erro ao carregar imagem</h3><p>Arquivo não encontrado</p></div>'">
            </div>
        {% elif arquivo_tipo == 'video' %}
            <div class="video-container">
                <video controls autoplay>
                    <source src="/{{ arquivo_caminho }}" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>
        {% else %}
            <div class="file-icon">
                <i class="fas fa-file-alt"></i>
                <h3>{{ arquivo_nome }}</h3>
                <p>Pré-visualização não disponível para este tipo de arquivo</p>
                <p style="margin-top: 10px;">Clique no botão abaixo para baixar</p>
            </div>
        {% endif %}
    </div>
    
    <a href="/download/{{ arquivo_id }}" class="download-btn">
        <i class="fas fa-download"></i> Baixar
    </a>
</body>
</html>
