<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ arquivo_nome }} - Clourf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: rgba(0,0,0,0.8); padding: 15px; display: flex; align-items: center; gap: 15px; position: fixed; top: 0; left: 0; right: 0; z-index: 10; backdrop-filter: blur(10px); }
        .back-btn { font-size: 24px; text-decoration: none; color: white; }
        .file-name { color: white; flex: 1; font-size: 14px; }
        
        .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 20px 20px; }
        img { max-width: 100%; max-height: 80vh; border-radius: 10px; object-fit: contain; }
        video { max-width: 100%; max-height: 80vh; border-radius: 10px; }
        .file-icon { text-align: center; color: white; }
        .file-icon i { font-size: 80px; margin-bottom: 20px; }
        .file-icon h3 { margin-bottom: 10px; }
        .file-icon p { color: #888; }
        
        .download-btn { position: fixed; bottom: 30px; right: 30px; background: #6C63FF; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="file-name">{{ arquivo_nome }}</div>
    </div>
    
    <div class="content">
        {% if arquivo_tipo == 'foto' %}
            <img src="/{{ arquivo_caminho }}" alt="{{ arquivo_nome }}">
        {% elif arquivo_tipo == 'video' %}
            <video controls autoplay>
                <source src="/{{ arquivo_caminho }}" type="video/mp4">
            </video>
        {% else %}
            <div class="file-icon">
                <i class="fas fa-file-alt"></i>
                <h3>{{ arquivo_nome }}</h3>
                <p>Pré-visualização não disponível</p>
            </div>
        {% endif %}
    </div>
    
    <a href="/download/{{ arquivo_id }}" class="download-btn">
        <i class="fas fa-download"></i> Baixar
    </a>
</body>
</html>
